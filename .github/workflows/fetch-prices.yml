name: Fetch Sold Prices

on:
  schedule:
    # Run every Wednesday at 8:00 AM UTC — weekly to conserve SoldComps quota
    - cron: "0 8 * * 3"
  workflow_dispatch:
    # Allow manual trigger from GitHub UI
    inputs:
      plants:
        description: "Comma-separated plant slugs to update (leave blank to run all enabled plants)"
        required: false
        default: ""

jobs:
  fetch-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Debug secrets (key lengths only)
        env:
          SOLDCOMPS_API_KEY: ${{ secrets.SOLDCOMP_API_KEY }}
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
        run: |
          echo "SOLDCOMPS_API_KEY length: ${#SOLDCOMPS_API_KEY}"
          echo "POSTGRES_URL set: $( [ -n "$POSTGRES_URL" ] && echo yes || echo no )"

      - name: Fetch and update prices
        env:
          SOLDCOMPS_API_KEY: ${{ secrets.SOLDCOMP_API_KEY }}
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
        run: |
          PLANTS="${{ github.event.inputs.plants }}"
          if [ -n "$PLANTS" ]; then
            npm run fetch-prices -- --plants="$PLANTS"
          else
            npm run fetch-prices
          fi

      - name: Commit and push changes
        run: |
          git config --local user.email "bot@aroid-atlas.com"
          git config --local user.name "Aroid Atlas Bot"
          git add content/plants/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update sold price data [skip ci]"
            git pull --rebase origin main
            git push
          fi

      - name: Notify on failure
        if: failure()
        run: |
          curl -s -o /dev/null -d "AroidAtlas price fetch FAILED — check GitHub Actions: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            https://ntfy.sh/aroidatlas-price-alerts || true
