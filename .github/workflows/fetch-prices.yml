name: Fetch Sold Prices

on:
  schedule:
    # Run every Wednesday at 8:00 AM UTC — once per week to stay within 50 calls/month
    - cron: "0 8 * * 3"
  workflow_dispatch:
    # Allow manual trigger from GitHub UI
    inputs:
      plants:
        description: "Comma-separated list of plant slugs to update (e.g., spiritus-sancti,venom)"
        required: false
        default: ""

jobs:
  fetch-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Fetch sold prices
        env:
          SOLDCOMP_API_KEY: ${{ secrets.SOLDCOMP_API_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.plants }}" ]; then
            node scripts/fetch-live-prices.js --plants="${{ github.event.inputs.plants }}"
          else
            node scripts/fetch-live-prices.js
          fi

      - name: Commit and push changes
        run: |
          git config user.name "ariod-atlas-bot"
          git config user.email "bot@ariodatlas.com"
          git add content/plants/
          if git diff --cached --quiet; then
            echo "No price data changes to commit."
          else
            git commit -m "chore: update sold price data [skip ci]"
            git push
          fi