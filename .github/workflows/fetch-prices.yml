name: Fetch Sold Prices

on:
  schedule:
    # Run every Wednesday and Saturday at 8:00 AM UTC — twice a week
    - cron: "0 8 * * 3,6"
  workflow_dispatch:
    # Allow manual trigger from GitHub UI
    inputs:
      plants:
        description: "Comma-separated list of plant slugs to update (e.g., spiritus-sancti,venom)"
        required: false
        default: ""

jobs:
  fetch-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Call admin price update endpoint
        env:
          ADMIN_PRICE_SECRET: ${{ secrets.ADMIN_PRICE_SECRET }}
        run: |
          PLANTS="${{ github.event.inputs.plants }}"
          if [ -z "$PLANTS" ]; then
            PLANTS="spiritus-sancti"
          fi

          # Use Vercel deployment URL from the environment
          SITE_URL="${VERCEL_URL:-https://ariod-atlas.vercel.app}"

          IFS=',' read -ra SLUGS <<< "$PLANTS"
          for slug in "${SLUGS[@]}"; do
            slug=$(echo "$slug" | xargs)  # trim whitespace
            echo "Fetching prices for: $slug"
            curl -s -o /dev/null -w "  Status: %{http_code}\n" \
              "$SITE_URL/api/admin/prices/update?slug=$slug&secret=$ADMIN_PRICE_SECRET"
          done
